<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertor</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Selector arriba a la derecha */
        .top-selector {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 100;
        }

        .custom-select {
            background-color: #111111;
            color: white;
            border: 1px solid #333333;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .custom-select:hover {
            border-color: #ffffff;
        }

        .main-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .big-card {
            background: #0a0a0a;
            border: 2px solid #1a1a1a;
            border-radius: 30px;
            width: 85%;
            max-width: 1000px;
            padding: 80px 40px;
            text-align: center;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.02);
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -4px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .form-control-lg {
            background-color: #111111 !important;
            border: 2px dashed #333333 !important;
            color: #ffffff !important;
            padding: 40px !important;
            font-size: 1.5rem !important;
            border-radius: 20px !important;
            margin-bottom: 30px;
        }

        .btn-massive {
            background-color: #ffffff;
            color: #000000;
            font-size: 1.8rem;
            font-weight: 900;
            padding: 22px;
            border-radius: 15px;
            text-transform: uppercase;
            border: none;
            transition: 0.3s;
        }

        .btn-massive:hover {
            background-color: #e0e0e0;
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <form action="/convertir" method="post" enctype="multipart/form-data">
        <!-- Selector Arriba a la Derecha -->
        <div class="top-selector">
            <select name="tipo_conversion" class="custom-select">
                <option value="pdf_to_word">PDF a WORD</option>
                <option value="word_to_pdf">WORD a PDF</option>
                <option value="excel_to_PDF">Excel to PDF</option>
            </select>
        </div>

        <div class="main-container">
            <div class="big-card">
                <h1>Convertor</h1>
                
                <div class="mb-3">
                    <input class="form-control form-control-lg" type="file" name="archivo" required>
                </div>
                
                <button type="submit" class="btn btn-massive w-100">
                    CONVERTIR AHORA
                </button>
            </div>
        </div>
    </form>

</body>
</html>
